<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Jarrdin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .card h1 { font-size: 1.6rem; color: #1a202c; margin-bottom: 8px; }
    .card p { color: #4a5568; margin-bottom: 32px; font-size: 0.95rem; }
    .btn {
      display: inline-block;
      background: #399051;
      color: #fff;
      padding: 12px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #2e8546; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Selamat Datang</h1>
    <p>Sesi Anda tidak ditemukan. Silakan masuk melalui halaman SRusun Member.</p>
    <a class="btn" id="otpLink" href="#">Masuk via SRusun Member</a>
  </div>

  <script>
    // Redirects to SRusun Member login page; SRusun will forward the session back via ?session= param
    const SRUSUN_URL = 'https://member.thejarrdin.com';
    const returnUrl = encodeURIComponent(window.location.origin);
    document.getElementById('otpLink').href = `${SRUSUN_URL}/?returnUrl=${returnUrl}`;
  </script>
</body>
</html>
